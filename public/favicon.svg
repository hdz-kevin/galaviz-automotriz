<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Wrench Mask for Jaw and Box End Cutouts -->
    <mask id="wrench-mask">
      <rect x="-300" y="-300" width="600" height="600" fill="white" />
      <!-- Jaw Cutout -->
      <polygon points="150,-32 260,-42 260,42 150,32" fill="black" transform="rotate(15 192 0)" />
      <!-- Hexagon Cutout for Box End -->
      <polygon points="-160,0 -176,27.7 -208,27.7 -224,0 -208,-27.7 -176,-27.7" fill="black" />
    </mask>
  </defs>

  <!-- Solid Accent Red Circle Background -->
  <circle cx="256" cy="256" r="240" fill="#C8102E" />

  <!-- Wrench (Flat White, Rotated -45 degrees) -->
  <g transform="translate(256, 256) rotate(-45)">
    <g mask="url(#wrench-mask)">
      <!-- Handle -->
      <rect x="-192" y="-24" width="384" height="48" rx="8" fill="#FFFFFF" />
      <!-- Closed End Head -->
      <circle cx="-192" cy="0" r="64" fill="#FFFFFF" />
      <!-- Open End Head -->
      <circle cx="192" cy="0" r="64" fill="#FFFFFF" />
    </g>
  </g>
</svg>